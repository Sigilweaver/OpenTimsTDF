# Publish workflow for OpenTDF.
#
# Triggered by pushing a version tag (v*).
# Publishes:
#   1. The opentdf Rust crate to crates.io
#   2. The opentdf Python wheel (maturin) to PyPI via Trusted Publishing
#
# Required secrets:
#   CARGO_REGISTRY_TOKEN  - crates.io API token (publish-new + publish-update)
#
# Required PyPI Trusted Publisher setup (no secret needed):
#   https://pypi.org/manage/project/opentdf/settings/publishing/
#   Publisher: GitHub Actions, Owner: Sigilweaver, Repo: OpenTDF,
#   Workflow: publish.yml, Environment: pypi

name: Publish

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 1. Rust crate ────────────────────────────────────────────────────────────
  publish-crate:
    name: Publish crate to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish opentdf
        run: cargo publish -p opentdf
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── 2. Python wheels ─────────────────────────────────────────────────────────
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          working-directory: python
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: python/dist

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: python

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: python/dist

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
